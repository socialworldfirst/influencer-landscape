<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Influencer marketing: economics &amp; the clean model</title>
<style>
  :root {
    --bg: #f5f5f7;
    --panel: #ffffff;
    --panel-soft: #fafafb;
    --panel-tint: #f0f0f3;

    --ink: #1d1d1f;
    --ink-2: #424245;
    --ink-3: #6e6e73;
    --ink-4: #86868b;
    --ink-5: #a1a1a6;

    --line: #e5e5ea;
    --line-soft: #ececef;
    --line-strong: #d2d2d7;

    --imp:   #0071e3;
    --ecom:  #009688;
    --free:  #b8650f;
    --buyer: #c0392b;
    --mute:  #8e8e93;

    --sidebar-w: 252px;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: #ffe066; }

  .layout { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }
  @media (max-width: 880px) { .layout { grid-template-columns: 1fr; } }

  /* SIDEBAR */
  aside.sidebar {
    background: var(--panel);
    border-right: 1px solid var(--line);
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
    display: flex; flex-direction: column;
    padding: 22px 18px 18px;
  }
  @media (max-width: 880px) {
    aside.sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); padding: 16px 18px; }
  }
  .brand { padding: 0 6px 18px; border-bottom: 1px solid var(--line-soft); margin-bottom: 18px; }
  .brand small { display: block; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-5); font-weight: 600; margin-bottom: 4px; }
  .brand strong { display: block; font-size: 15px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; }
  .nav-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-5); font-weight: 600; padding: 0 6px 8px; }
  nav.toc { display: flex; flex-direction: column; gap: 1px; }
  nav.toc a { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; color: var(--ink-3); text-decoration: none; font-size: 13px; transition: background .12s ease, color .12s ease; line-height: 1.3; }
  nav.toc a:hover { background: var(--panel-tint); color: var(--ink); }
  nav.toc a.active { background: var(--panel-tint); color: var(--ink); font-weight: 600; }
  nav.toc a .num { font-size: 11px; color: var(--ink-5); font-variant-numeric: tabular-nums; font-weight: 600; width: 18px; flex-shrink: 0; }
  nav.toc a.active .num { color: var(--ink); }
  .sidebar-foot { margin-top: auto; padding: 14px 6px 0; border-top: 1px solid var(--line-soft); font-size: 11px; color: var(--ink-5); line-height: 1.5; }

  /* MAIN */
  main.main { padding: 32px 56px 80px; max-width: 1180px; width: 100%; }
  @media (max-width: 720px) { main.main { padding: 24px 20px 64px; } }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding-bottom: 14px; margin-bottom: 24px; border-bottom: 1px solid var(--line); font-size: 12px; color: var(--ink-4); }
  .topbar .crumbs span { color: var(--ink-3); }
  .topbar .crumbs span + span::before { content: " / "; color: var(--ink-5); }
  .meta-pill { background: var(--panel); border: 1px solid var(--line); border-radius: 5px; padding: 3px 8px; font-size: 11px; color: var(--ink-3); }
  .meta-pill b { color: var(--ink); font-weight: 600; }

  /* HERO */
  .hero { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 28px 32px; margin-bottom: 24px; box-shadow: var(--shadow); }
  .hero h1 { font-size: 29px; line-height: 1.16; letter-spacing: -0.02em; font-weight: 600; margin: 0 0 10px; max-width: 760px; }
  .hero p.lede { font-size: 14.5px; color: var(--ink-3); margin: 0 0 22px; max-width: 720px; }
  .hero p.lede strong { color: var(--ink-2); font-weight: 600; }

  /* STAT STRIP */
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  @media (max-width: 720px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; padding: 13px 15px; }
  .stat b { display: block; font-size: 23px; font-weight: 600; color: var(--ink); line-height: 1.1; letter-spacing: -0.015em; margin-bottom: 4px; font-variant-numeric: tabular-nums; }
  .stat span { font-size: 11px; color: var(--ink-4); line-height: 1.35; display: block; }
  .stat.red b { color: var(--buyer); }
  .stat.blue b { color: var(--imp); }

  /* SECTION */
  section.panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 24px 28px 28px; margin-bottom: 18px; box-shadow: var(--shadow); scroll-margin-top: 16px; }
  .panel-head { display: flex; align-items: baseline; gap: 14px; padding-bottom: 14px; margin-bottom: 18px; border-bottom: 1px solid var(--line-soft); }
  .panel-head .badge { font-size: 10.5px; color: var(--ink-5); background: var(--panel-tint); padding: 3px 7px; border-radius: 4px; font-variant-numeric: tabular-nums; font-weight: 600; letter-spacing: 0.04em; }
  .panel-head h2 { font-size: 19px; font-weight: 600; margin: 0; letter-spacing: -0.01em; flex: 1; }
  .panel-head .head-meta { font-size: 11.5px; color: var(--ink-4); }
  .panel-sub { color: var(--ink-3); margin: 0 0 20px; font-size: 13.5px; max-width: 800px; }
  .panel-sub strong { color: var(--ink-2); font-weight: 600; }

  p.body-p { font-size: 13.5px; color: var(--ink-2); margin: 0 0 14px; max-width: 820px; }
  p.body-p strong { color: var(--ink); font-weight: 600; }
  p.body-p:last-child { margin-bottom: 0; }

  /* GRIDS */
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media (max-width: 1100px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .grid-3 { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px) { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } }

  /* CARD */
  .card { background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; padding: 16px 18px; display: flex; flex-direction: column; gap: 9px; transition: border-color .12s ease; }
  .card:hover { border-color: var(--line-strong); }
  .card .row { display: flex; align-items: center; gap: 8px; }
  .swatch { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sw-imp { background: var(--imp); } .sw-ecom { background: var(--ecom); } .sw-free { background: var(--free); } .sw-buyer { background: var(--buyer); } .sw-mute { background: var(--mute); }
  .card .name { font-size: 14.5px; font-weight: 600; margin: 0; color: var(--ink); letter-spacing: -0.005em; }
  .card .name .sub { font-size: 11.5px; color: var(--ink-4); font-weight: 500; }
  .card .essence { font-size: 12.5px; color: var(--ink-3); margin: 0; line-height: 1.5; }
  .card .essence strong { color: var(--ink-2); font-weight: 600; }
  .card .foot { margin-top: auto; padding-top: 11px; border-top: 1px solid var(--line-soft); font-size: 12px; color: var(--ink-2); }
  .card .foot .lbl { display: block; font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-5); margin-bottom: 3px; font-weight: 600; }
  .stat-inline { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--ink); }

  /* MATRIX */
  .matrix { background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; overflow: hidden; }
  .matrix table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .matrix th, .matrix td { text-align: left; padding: 11px 14px; border-bottom: 1px solid var(--line-soft); vertical-align: top; }
  .matrix tbody tr:last-child td { border-bottom: 0; }
  .matrix tbody tr:hover td { background: rgba(0,0,0,0.015); }
  .matrix th { font-weight: 500; color: var(--ink-4); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; background: var(--panel-tint); white-space: nowrap; }
  .matrix td.label { font-weight: 600; color: var(--ink); white-space: nowrap; }
  .matrix td .n { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--ink); }
  .matrix td.note { color: var(--ink-3); font-size: 12.5px; }

  .fit { display: inline-flex; gap: 3px; align-items: center; }
  .fit .d { width: 6px; height: 6px; border-radius: 50%; background: var(--line-strong); }
  .fit.h .d:nth-child(1), .fit.h .d:nth-child(2), .fit.h .d:nth-child(3) { background: var(--buyer); }
  .fit.m .d:nth-child(1), .fit.m .d:nth-child(2) { background: var(--free); }
  .fit.l .d:nth-child(1) { background: var(--ink-3); }
  .legend { margin-top: 12px; display: flex; gap: 18px; flex-wrap: wrap; font-size: 11px; color: var(--ink-4); }
  .legend > span { display: inline-flex; align-items: center; gap: 7px; }

  /* FUNNEL / SPLIT BARS */
  .split-row { display: grid; grid-template-columns: 200px 1fr; gap: 18px; align-items: center; padding: 11px 0; border-top: 1px solid var(--line-soft); }
  .split-row:first-of-type { border-top: 0; }
  .split-row .who { font-size: 12.5px; color: var(--ink-2); font-weight: 500; }
  .split-row .who small { display: block; color: var(--ink-4); font-size: 11px; font-weight: 400; }
  .bar2 { display: flex; height: 26px; border-radius: 4px; overflow: hidden; border: 1px solid var(--line-soft); }
  .bar2 .seg { display: flex; align-items: center; padding: 0 9px; font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .seg-creator { background: var(--ecom); }
  .seg-agency { background: var(--buyer); }
  .seg-platform { background: var(--ink-4); }
  .bar2-legend { display: flex; gap: 16px; margin-top: 14px; font-size: 11px; color: var(--ink-4); }
  .bar2-legend span { display: inline-flex; align-items: center; gap: 6px; }
  .bar2-legend i { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }

  /* FRAMING SPLIT */
  .framing { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 800px) { .framing { grid-template-columns: 1fr; } }
  .frame { background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; padding: 20px 22px; }
  .frame .ftag { display: inline-flex; align-items: center; gap: 7px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; color: var(--ink-4); margin-bottom: 10px; }
  .frame h3 { font-size: 16px; font-weight: 600; margin: 0 0 3px; letter-spacing: -0.01em; }
  .frame .geo { font-size: 12px; color: var(--ink-4); margin: 0 0 14px; }
  .frame ul { margin: 0; padding: 0; list-style: none; }
  .frame ul li { padding: 8px 0; border-top: 1px solid var(--line-soft); font-size: 12.5px; color: var(--ink-2); line-height: 1.5; }
  .frame ul li:first-child { border-top: 0; }
  .frame ul li strong { color: var(--ink); font-weight: 600; }
  .frame .verdict { margin-top: 14px; padding: 11px 13px; background: var(--panel); border: 1px solid var(--line-soft); border-radius: 6px; font-size: 12.5px; color: var(--ink-2); }
  .frame .verdict b { color: var(--ink); }

  /* QUOTE */
  blockquote.q { margin: 0 0 14px; padding: 13px 16px; background: var(--panel-soft); border-left: 2px solid var(--line-strong); border-radius: 4px; font-size: 13px; color: var(--ink-2); line-height: 1.5; font-style: italic; }
  blockquote.q cite { display: block; margin-top: 7px; font-style: normal; font-size: 11px; color: var(--ink-4); letter-spacing: 0.02em; }

  /* CALLOUT (neutral) */
  .callout { display: flex; gap: 11px; align-items: flex-start; padding: 14px 16px; background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; font-size: 13px; color: var(--ink-2); line-height: 1.55; margin-top: 4px; }
  .callout .mark { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .callout strong { color: var(--ink); font-weight: 600; }

  .lead-num { font-variant-numeric: tabular-nums; }

  /* STEP LIST */
  .steps { counter-reset: step; display: flex; flex-direction: column; gap: 12px; }
  .step { display: grid; grid-template-columns: 30px 1fr; gap: 14px; align-items: start; }
  .step .sn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--line-strong); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--ink-2); font-variant-numeric: tabular-nums; }
  .step .sc h4 { margin: 2px 0 4px; font-size: 14px; font-weight: 600; }
  .step .sc p { margin: 0; font-size: 12.5px; color: var(--ink-3); line-height: 1.5; }
  .step .sc p strong { color: var(--ink-2); font-weight: 600; }

  /* SOURCES */
  .src-list { margin: 0; padding: 0; list-style: none; }
  .src-list li { padding: 9px 0; border-top: 1px solid var(--line-soft); font-size: 12.5px; color: var(--ink-3); line-height: 1.5; }
  .src-list li:first-child { border-top: 0; }
  .src-list li b { color: var(--ink-2); font-weight: 600; }
  .src-list li .u { color: var(--ink-4); font-size: 11.5px; word-break: break-all; }

  footer { margin-top: 26px; padding-top: 18px; border-top: 1px solid var(--line); font-size: 11.5px; color: var(--ink-5); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

  body.locked { overflow: hidden; }
  #gate { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 1000; padding: 20px; }
  #gate-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 30px 28px; width: 330px; max-width: 100%; box-shadow: var(--shadow); }
  #gate-card .eyebrow { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-5); font-weight: 600; margin-bottom: 6px; }
  #gate-card h2 { font-size: 16px; font-weight: 600; margin: 0 0 18px; color: var(--ink); letter-spacing: -0.01em; line-height: 1.3; }
  #gate-form { display: flex; gap: 8px; }
  #gate-input { flex: 1; padding: 9px 12px; border: 1px solid var(--line-strong); border-radius: 7px; font-size: 14px; font-family: inherit; outline: none; }
  #gate-input:focus { border-color: var(--ink); }
  #gate-btn { padding: 9px 16px; border: 0; border-radius: 7px; background: var(--ink); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  #gate-err { color: var(--buyer); font-size: 12px; margin-top: 10px; min-height: 14px; }
  #content[hidden] { display: none; }
</style>
</head>
<body class="locked">
<div id="gate">
  <div id="gate-card">
    <div class="eyebrow">Confidential &middot; WorldFirst</div>
    <h2>Influencer marketing: economics &amp; the clean model</h2>
    <form id="gate-form" onsubmit="return gateSubmit(event)">
      <input id="gate-input" type="password" placeholder="password" autocomplete="off" autofocus>
      <button id="gate-btn" type="submit">Enter</button>
    </form>
    <div id="gate-err"></div>
  </div>
</div>

<script>
const LSKEY = "imland_pw";
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,iter){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const blob=JSON.parse(document.getElementById('payload').textContent);const key=await deriveKey(pw,b64ToBytes(blob.salt),blob.iterations);const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(blob.iv)},key,b64ToBytes(blob.ciphertext));return new TextDecoder().decode(plain);}
function reveal(innerHtml){const c=document.getElementById('content');c.innerHTML=innerHtml;c.hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');initReport();}
function initReport(){

  const sections = document.querySelectorAll('section.panel[id], .hero[id]');
  const navLinks = document.querySelectorAll('nav.toc a');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        navLinks.forEach(link => link.classList.toggle('active', link.getAttribute('href') === '#' + id));
      }
    });
  }, { rootMargin: '-25% 0px -65% 0px', threshold: 0 });
  sections.forEach(s => observer.observe(s));
  navLinks.forEach(link => {
    link.addEventListener('click', (e) => {
      const target = document.querySelector(link.getAttribute('href'));
      if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    });
  });

}
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input');const err=document.getElementById('gate-err');err.textContent='';try{const html=await decryptPayload(inp.value);reveal(html);try{localStorage.setItem(LSKEY,inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
(async()=>{try{const cached=localStorage.getItem(LSKEY);if(cached){reveal(await decryptPayload(cached));}}catch(_){try{localStorage.removeItem(LSKEY);}catch(_){}}})();
</script>
